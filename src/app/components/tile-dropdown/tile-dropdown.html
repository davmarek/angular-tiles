<div class="dropdown-container">
  <button class="icon-button" type="button" (click)="toggle()" [class.active]="isOpen">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink"
      width="16"
      height="16"
      viewBox="0 0 16 16"
      fill="currentColor"
    >
      <path
        id="dots-path"
        d="M3 7a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm5 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm5 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"
      />
    </svg>
  </button>
  @if (isOpen) {
    <div class="dropdown-menu">
      <button type="button">
        <img src="assets/icons/icon-admin-iconset-image-from-dam.svg" alt="Asset" width="16" />
        Asset in DAM
      </button>
      <button type="button" class="more-options">
        <img src="assets/icons/icon-admin-iconset-plus-grey.svg" alt="plus" width="16" />
        More options
      </button>
    </div>
  }
</div>
