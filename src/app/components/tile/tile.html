<li>
  <a
    class="tile-container"
    [href]="link()"
    target="_blank"
    [class.is-square]="span() === 1"
    [style.gridColumn]="`span ${span()}`"
    [style.background-color]="bgColor()"
    [style.background-image]="`url(${bgImage() ?? ''})`"
  >
    <span>{{ text() }}</span>
  </a>
</li>
