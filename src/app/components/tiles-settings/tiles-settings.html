<dialog #tilesSettingsDialog id="tilesSettingsDialog" (toggle)="onToggle($event)">
  <form [formGroup]="form" (ngSubmit)="onSave()">
    <aside class="left">
      <header>
        <div class="dialog-name">
          <icon-admin-quares />
          <span>TILES</span>
        </div>
        <nav>
          <ul>
            <li class="active">General</li>
          </ul>
        </nav>
      </header>
      <div class="content">
        <div class="grid-schema-control">
          <label for="gridSchema">Display</label>

          <select name="gridSchema" id="gridSchema" formControlName="gridSchema" type="number">
            <option value="3">3 columns</option>
            <option value="4">4 columns</option>
          </select>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <div class="form-group-name">Text</div>
          <div class="form-control-input">
            <label for="title">Title</label>
            <input type="text" formControlName="title" />
          </div>

          <div class="form-control-input">
            <label for="subtitle">Subtitle</label>
            <input type="text" formControlName="subtitle" />
          </div>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <div class="form-group-name">Other</div>
        </div>

        <div class="load-all-control">
          <div class="form-control-toggle">
            <label>Load all</label>
            <app-toggle
              [checked]="loadAll()"
              (checkedChange)="loadAll.set($event); markFormDirty()"
            />
          </div>
          @if (!loadAll()) {
            <div class="form-control-input">
              <label>Tiles visible</label>

              <input
                type="number"
                min="1"
                [max]="form.controls.tiles.length"
                formControlName="visibleTilesCount"
              />
            </div>
          }
        </div>
      </div>
      <div class="bottom">
        <button type="submit" [disabled]="!form.valid || form.pristine">Update</button>
      </div>
    </aside>

    <div class="right">
      <div class="close">
        <button type="button" commandfor="tilesSettingsDialog" command="close" class="cross">
          <img src="/assets/icons/icon-admin-iconset-cross-small.svg" alt="Settings" />
        </button>
      </div>

      <div class="content">
        <header>
          <div class="actions">
            <span class="heading">Tiles</span>
            <button type="button" (click)="addTile()">
              <img src="/assets/icons/icon-admin-iconset-plus.svg" alt="Plus" />
              Add
            </button>
          </div>
        </header>
        <table>
          <thead>
            <tr>
              <th>X</th>
              <th class="center">BG</th>
              <th>Text</th>
              <th>Link</th>
              <th class="right">
                <button>V</button>
              </th>
            </tr>
          </thead>
          <tbody formArrayName="tiles">
            @for (tile of tiles.controls; track tile; let i = $index) {
              <tr [formGroupName]="i">
                <td>
                  <button>X</button>
                </td>
                <td>
                  <input type="color" formControlName="bgColor" />
                </td>
                <td>
                  <input type="text" formControlName="text" />
                </td>
                <td>
                  <input type="text" formControlName="link" />
                </td>
                <td>
                  <input type="text" formControlName="bgImage" />
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </form>
</dialog>
